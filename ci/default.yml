variables:
  - name: solution
    value: SourcemapTools.slnx
  - name: build_configuration
    value: Release
  - name: packageVersion
    value: 3.3.0
  - name: nugetDevVersion
    value: 3.3.1

trigger:
  - master
  - release
pr:
  branches:
    include:
    - '*'

stages:

- stage: ''
  displayName: ''
  jobs:
  - job: main_job
    pool:
      vmImage: 'windows-2022'
    displayName: 'SourceMap Tools'

    steps:

#########
# BUILD #
#########
    - powershell: echo "##vso[task.setvariable variable=packageVersion]$(nugetDevVersion)-rc.$(Build.BuildId)"
      condition: eq(variables['Build.SourceBranchName'], 'master')
      displayName: Update nuget version

    - task: DotNetCoreCLI@2
      inputs:
        command: 'build'
        projects: '$(solution)'
        arguments: '-property:ContinuousIntegrationBuild=true -property:Version=$(packageVersion) --configuration $(build_configuration)'
      displayName: Build Solution

###############
# BUILD NUGET #
###############
    - script: dotnet pack $(Build.SourcesDirectory)/src/SourceMapTools/SourcemapTools.csproj -c $(build_configuration) -property:Version=$(packageVersion) --no-build --output $(Build.SourcesDirectory)/.build/nuget
      displayName: Build nuget
      condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables['Build.SourceBranchName'], 'release')))

########
# TEST #
########
    - script: dotnet test $(Build.SourcesDirectory)/$(solution) -c $(build_configuration) --report-trx
      displayName: 'Run Tests'
      condition: succeededOrFailed()

    - task: PublishTestResults@2
      inputs:
        testRunner: VsTest
        testResultsFiles: '**/*.trx'
        testRunTitle: 'Tests'
        failTaskOnMissingResultsFile: true
      displayName: 'Publish test results'
      condition: succeededOrFailed()

#################
# PUBLISH NUGET #
#################
    - task: NuGetCommand@2
      inputs:
        command: 'push'
        packagesToPush: '$(Build.SourcesDirectory)/.build/nuget/SourceMapTools.*.nupkg'
        nuGetFeedType: 'internal'
        publishVstsFeed: 'd119c8d5-d981-4087-b983-65c3339155a0/8c90a52a-2539-4e08-84e4-05beb440b781'
      displayName: Publish to Azure Artifacts feed
      condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'master'))

    - task: NuGetCommand@2
      inputs:
        command: 'push'
        packagesToPush: '$(Build.SourcesDirectory)/.build/nuget/SourceMapTools.*.nupkg'
        nuGetFeedType: 'external'
        publishFeedCredentials: 'nuget.org'
      displayName: Publish to Nuget.org
      condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'release'))
