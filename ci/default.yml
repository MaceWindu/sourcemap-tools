variables:
  - name: solution
    value: SourcemapTools.slnx
  - name: build_configuration
    value: Release
  - name: packageVersion
    value: 3.3.0
  - name: nugetDevVersion
    value: 3.3.1

trigger:
  - master
  - release
pr:
  branches:
    include:
    - '*'

stages:

- stage: ''
  displayName: ''
  jobs:
  - job: main_job
    pool:
      vmImage: 'windows-2022'
    displayName: 'SourceMap Tools'

    steps:

    - task: UseDotNet@2
      inputs:
        useGlobalJson: true
      displayName: Install .NET SDK (from global.json)

    # global.json installs the .NET 10 SDK (and runtime); the test project also
    # targets net8.0/net9.0, so install those runtimes to execute every leg.
    - task: UseDotNet@2
      inputs:
        packageType: runtime
        version: '8.0.x'
      displayName: Install .NET 8 runtime

    - task: UseDotNet@2
      inputs:
        packageType: runtime
        version: '9.0.x'
      displayName: Install .NET 9 runtime

#########
# BUILD #
#########
    - powershell: echo "##vso[task.setvariable variable=packageVersion]$(nugetDevVersion)-rc.$(Build.BuildId)"
      condition: eq(variables['Build.SourceBranchName'], 'master')
      displayName: Update nuget version

    - task: DotNetCoreCLI@2
      inputs:
        command: 'build'
        projects: '$(solution)'
        arguments: '-property:ContinuousIntegrationBuild=true -property:Version=$(packageVersion) --configuration $(build_configuration)'
      displayName: Build Solution

###############
# BUILD NUGET #
###############
    - script: dotnet pack $(Build.SourcesDirectory)/src/SourceMapTools/SourcemapTools.csproj -c $(build_configuration) -property:Version=$(packageVersion) -property:RepositoryBranch=$(Build.SourceBranchName) --no-build --output $(Build.SourcesDirectory)/.build/nuget
      displayName: Build nuget
      condition: and(succeeded(), or(eq(variables['Build.SourceBranchName'], 'master'), eq(variables['Build.SourceBranchName'], 'release')))

########
# TEST #
########
    - script: dotnet test $(Build.SourcesDirectory)/$(solution) -c $(build_configuration) --report-trx
      displayName: 'Run Tests'
      condition: succeededOrFailed()

    - task: PublishTestResults@2
      inputs:
        testRunner: VsTest
        testResultsFiles: '**/*.trx'
        testRunTitle: 'Tests'
        failTaskOnMissingResultsFile: true
      displayName: 'Publish test results'
      condition: succeededOrFailed()

#################
# PUBLISH NUGET #
#################
    # master: push to the Azure Artifacts feed (DotNetCoreCLI@2 push handles internal-feed auth and invokes dotnet)
    - task: DotNetCoreCLI@2
      inputs:
        command: 'push'
        packagesToPush: '$(Build.SourcesDirectory)/.build/nuget/SourceMapTools.*.nupkg'
        nuGetFeedType: 'internal'
        publishVstsFeed: 'd119c8d5-d981-4087-b983-65c3339155a0/8c90a52a-2539-4e08-84e4-05beb440b781'
      displayName: Publish to Azure Artifacts feed
      condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'master'))

    # release: push to nuget.org with `dotnet nuget push`.
    # Requires a secret pipeline variable NUGET_API_KEY (nuget.org API key).
    - script: dotnet nuget push "$(Build.SourcesDirectory)/.build/nuget/SourceMapTools.*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "$(NUGET_API_KEY)" --skip-duplicate
      displayName: Publish to Nuget.org
      condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'release'))
